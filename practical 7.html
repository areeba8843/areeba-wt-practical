<!DOCTYPE html> 
<html> 
<head> 
    <title>Practical No 7</title> 
    <style> 
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
        } 
 
        /* Navigation */ 
        nav { 
            background-color: rgb(54, 24, 24); 
            padding: 15px; 
            text-align: center; 
            position: fixed; 
            width: 100%; 
            top: 0; 
        } 
         
        nav a { 
            color: white; 
            text-decoration: none; 
            margin: 15px; 
        } 
 
        nav a:hover { 
            color: rgb(64, 0, 255); 
        } 
 
        /* Each section takes full screen */ 
        section { 
            height: 100vh;              /* Full screen height */ 
            padding-top: 80px;          /* Space for fixed nav */ 
            text-align: center; 
        } 
 
        /* Different background colors for clarity */ 
        #home { background-color: #b8a0a0; } 
        #table { background-color: #e6f7ff; } 
        #form { background-color: #fff0f5; } 
        #media { background-color: #f9f9d1; } 
 
        table { 
            margin: auto; 
            border-collapse: collapse; 
        } 
 
        th, td { 
            border: 1px solid black; 
            padding: 8px; 
        } 
 
        input[type="submit"] { 
            padding: 8px 12px; 
            background-color: black; 
            color: white; 
            border: none; 
        } 
 
        input[type="submit"]:hover { 
            background-color: gray; 
        } 
 
        html { 
            scroll-behavior: smooth;   /* Smooth scrolling */ 
        } 
    </style> 
</head> 
 
<body> 
 
<!-- Navigation Bar --> 
<nav> 
    <a href="#home">Home</a> 
    <a href="#table">Table</a> 
    <a href="#form">Form</a> 
    <a href="#media">Media</a> 
</nav> 
 
 
<!-- Home Section --> 
<section id="home"> 
    <h1>Welcome</h1> 
    <p>This is a multi-section webpage example.</p> 
</section> 
 
<!-- Table Section --> 
<section id="table"> 
    <h2>Student Data</h2> 
 
    <table> 
        <tr> 
            <th>Name</th> 
            <th>Age</th> 
            <th>Course</th> 
        </tr> 
        <tr> 
            <td>Alice</td> 
            <td>20</td> 
            <td>Computer</td> 
        </tr> 
        <tr> 
            <td>Bob</td> 
            <td>22</td> 
            <td>Science</td> 
        </tr> 
    </table> 
</section> 
 
<!-- Form Section --> 
<section id="form"> 
    <h2>Registration Form</h2> 
 
    <form> 
        Name: <br> 
        <input type="text"><br> 
 
        Email: <br> 
        <input type="email"><br> 
 
        Gender: <br> 
        <input type="radio" name="gender"> Male 
        <input type="radio" name="gender"> Female<br> 
 
        Hobbies: <br> 
        <input type="checkbox"> Music 
        <input type="checkbox"> Sports<br><br> 
 
        <input type="submit" value="Submit"> 
    </form> 
</section> 
 
<!-- Media Section --> 
<section id="media"> 
    <h2>Audio & Video</h2> 
 
    <p>Audio:</p> 
    <audio controls> 
        <source src="sample.mp3" type="audio/mpeg"> 
    </audio> 
 
    <p>Video:</p> 
    <video width="300" controls> 
        <source src="sample.mp4" type="video/mp4"> 
    </video> 
</section> 
 
</body> 
</html>
